<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker | Manage Your Wealth</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="app-container">
        <header class="app-header">
            <h1>Expense Tracker</h1>
            <p>Smartly manage your wealth</p>
        </header>

        <section class="summary-cards">
            <div class="card glass-panel total-balance">
                <div class="card-icon"><i class="fa-solid fa-wallet"></i></div>
                <div class="card-info">
                    <h4>Total Balance</h4>
                    <h2 id="balance">$0.00</h2>
                </div>
            </div>

            <div class="card glass-panel income-expense">
                <div class="mini-card income">
                    <div class="mini-icon"><i class="fa-solid fa-arrow-trend-up"></i></div>
                    <div class="mini-info">
                        <h5>Income</h5>
                        <p id="money-plus">+$0.00</p>
                    </div>
                </div>
                <div class="mini-card expense">
                    <div class="mini-icon"><i class="fa-solid fa-arrow-trend-down"></i></div>
                    <div class="mini-info">
                        <h5>Expense</h5>
                        <p id="money-minus">-$0.00</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="main-content">
            <div class="glass-panel add-transaction-section">
                <h3>Add New Transaction</h3>
                <form id="form">
                    <div class="form-control">
                        <label for="text">Description</label>
                        <input type="text" id="text" placeholder="e.g. Salary, Groceries..." required>
                    </div>

                    <div class="form-control">
                        <label for="amount">Amount <br>
                            <small>(negative - expense, positive + income)</small>
                        </label>
                        <div class="amount-input-wrapper">
                            <span class="currency-symbol">$</span>
                            <input type="number" id="amount" placeholder="0.00" step="0.01" required>
                        </div>
                    </div>

                    <button class="btn pulse-effect" type="submit">Add Transaction</button>
                </form>
            </div>

            <div class="glass-panel history-section">
                <h3>Transaction History</h3>
                <ul id="list" class="list">
                    <!-- Transactions will be added here via JS -->
                </ul>
            </div>
        </section>
    </main>

    <!-- App Logic -->
    <script src="app.js"></script>
</body>

</html>
